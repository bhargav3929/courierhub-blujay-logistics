# Blujay Logistics - Client Loom
# https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "94b8c28f5c5cec4c2480226c723bb865"
name = "Blujay Logistics - Client Loom"
application_url = "https://blujaylogistic.com"
embedded = false

[build]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  uri = "/api/integrations/shopify-looms/gdpr/customers-data-request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/api/integrations/shopify-looms/gdpr/customers-redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/api/integrations/shopify-looms/gdpr/shop-redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
scopes = "read_orders,write_fulfillments,read_merchant_managed_fulfillment_orders,write_merchant_managed_fulfillment_orders"
optional_scopes = [ ]
use_legacy_install_flow = true

[auth]
redirect_urls = [
  "https://blujaylogistic.com/api/integrations/shopify-looms/callback"
]

[pos]
embedded = false
